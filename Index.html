<!DOCTYPE html>
<html>
<head>
    <title>New Chart AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #111827;
            color: white;
            text-align: center;
        }

        .header {
            padding: 20px;
            background: #2563eb;
            font-size: 25px;
            font-weight: bold;
        }

        .chat {
            margin: 30px;
            background: #1f2937;
            padding: 20px;
            border-radius: 15px;
        }

        input {
            width: 80%;
            padding: 15px;
            border-radius: 20px;
            border: none;
        }

        button {
            margin-top: 15px;
            padding: 15px 30px;
            border: none;
            border-radius: 20px;
            background: #2563eb;
            color: white;
        }
    </style>

</head>

<body>

<div class="header">
New Chart AI
</div>

<div class="chat">

<h2>AI Assistant</h2>

<p id="reply">
Hello 👋 I am your AI assistant.
</p>

<input id="message" placeholder="Ask me anything">

<br>

<button onclick="sendMessage()">
Send
</button>

</div>


<script>

function sendMessage(){

let text = document.getElementById("message").value;

if(text==""){
alert("Type something");
return;
}

document.getElementById("reply").innerHTML =
"You said: " + text + 
"<br><br>AI is processing your request...";

}

</script>


</body>
  </html>
